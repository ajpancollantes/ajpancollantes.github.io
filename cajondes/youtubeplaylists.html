<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SheetsTube Player</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23ef4444%22/><path d=%22M40 30 L70 50 L40 70 Z%22 fill=%22white%22/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .aspect-w-16 { position: relative; padding-bottom: 56.25%; background: black; }
        .aspect-w-16 iframe, .aspect-w-16 video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-item { transition: all 0.3s ease; }
        /* Prevent elastic scrolling on mobile */
        html, body { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col font-sans overflow-hidden">

    <audio id="dummy-audio" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" loop playsinline></audio>

    <!-- Header Fix: Ensure visibility on mobile -->
    <header class="bg-gray-800 px-4 py-3 shadow-md flex justify-between items-center z-50 shrink-0 border-b border-gray-700">
        <div class="flex items-center gap-2 min-w-0">
            <svg class="w-6 h-6 md:w-8 md:h-8 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-1.768,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.667,15.333V8.667L15.667,12L9.667,15.333z"/></svg>
            <h1 class="text-base md:text-xl font-bold tracking-tight truncate">SheetsTube</h1>
        </div>
        
        <div class="flex items-center gap-3 md:gap-5 shrink-0">
            <!-- Upload Button -->
            <button onclick="document.getElementById('local-file-input').click()" class="p-1 text-gray-400 hover:text-white transition-colors active:scale-95" title="Upload Local Video">
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            </button>
            <input type="file" id="local-file-input" class="hidden" accept="video/*" onchange="handleLocalFileUpload(event)">
            
            <!-- Settings Button -->
            <button onclick="openConfig()" class="p-1 text-gray-400 hover:text-white transition-colors active:scale-95" title="Settings">
                <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37-1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <!-- Player Area -->
        <div class="w-full md:w-2/3 lg:w-3/4 bg-black flex flex-col justify-start overflow-hidden">
            <div id="player-wrapper" class="hidden w-full flex flex-col h-full">
                <div id="player-container" class="aspect-w-16 w-full shadow-2xl shrink-0">
                    <div id="yt-player"></div>
                    <video id="local-player" class="hidden" controls playsinline></video>
                </div>
                
                <div class="w-full bg-gray-900 py-4 flex justify-center items-center gap-8 md:gap-12 border-t border-gray-800 shrink-0">
                    <button onclick="seekVideo(-20)" class="text-gray-400 hover:text-white flex items-center gap-2 transition group p-2">
                        <svg class="w-7 h-7 md:w-8 md:h-8 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                        <span class="text-xs font-bold">20s</span>
                    </button>
                    
                    <button onclick="togglePlayPause()" class="w-14 h-14 md:w-16 md:h-16 bg-red-600 hover:bg-red-700 text-white rounded-full flex justify-center items-center shadow-lg transition-transform hover:scale-105 active:scale-90">
                        <svg id="icon-play" class="w-7 h-7 md:w-8 md:h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" class="w-7 h-7 md:w-8 md:h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    
                    <button onclick="seekVideo(20)" class="text-gray-400 hover:text-white flex items-center gap-2 transition group p-2">
                        <span class="text-xs font-bold">20s</span>
                        <svg class="w-7 h-7 md:w-8 md:h-8 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="player-placeholder" class="flex flex-col items-center justify-center text-gray-500 p-10 text-center h-full">
                <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <p class="text-base font-medium">Select a playlist or a local video</p>
                <p class="text-xs mt-2 opacity-50">Local files work without internet connection.</p>
            </div>
        </div>

        <!-- Sidebar / List Area -->
        <div class="w-full md:w-1/3 lg:w-1/4 bg-gray-800 flex flex-col border-l border-gray-700 h-[40vh] md:h-auto shrink-0">
            <div class="p-4 bg-gray-900 border-b border-gray-700 shrink-0">
                <label for="playlist-selector" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Playlist Selection</label>
                <select id="playlist-selector" class="w-full bg-gray-800 text-white border border-gray-600 rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-red-500 transition-all disabled:opacity-50 text-sm" disabled onchange="loadPlaylist(this.value)">
                    <option value="">Loading...</option>
                </select>
            </div>
            <div id="video-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 bg-gray-800"></div>
            <div id="list-loading" class="hidden p-10 flex items-center justify-center text-gray-400">
                <svg class="animate-spin h-8 w-8 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </div>
        </div>
    </main>

    <!-- Modal Settings -->
    <div id="config-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] hidden backdrop-blur-sm p-4">
        <div class="bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-6 border border-gray-700">
            <h2 class="text-xl font-bold mb-2 text-white">Settings</h2>
            <p class="text-gray-400 text-xs mb-6 uppercase tracking-wider font-semibold">Google Sheets Sync</p>
            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-400 mb-1">Spreadsheet ID</label>
                <input type="text" id="input-sheet-id" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg py-2.5 px-3 focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <div class="mb-6">
                <label class="block text-xs font-medium text-gray-400 mb-1">Google API Key</label>
                <input type="password" id="input-api-key" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg py-2.5 px-3 focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <div id="config-error" class="hidden mb-4 p-3 bg-red-900/50 text-red-200 text-xs rounded-lg border border-red-700/50"></div>
            <div class="flex flex-col gap-2">
                <button onclick="saveConfig()" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-xl shadow-lg transition-all active:scale-95">Save & Connect</button>
                <button onclick="closeConfig()" id="btn-cancel-config" class="w-full py-2 text-xs font-medium text-gray-400 hover:text-white transition-colors hidden">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        // IndexedDB Persistence Logic
        const DB_NAME = "SheetsTubeLocalDB";
        const STORE_NAME = "videos";
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e);
            });
        };

        const saveLocalVideo = async (file) => {
            const videoId = "local_" + Date.now();
            const videoData = {
                id: videoId,
                name: file.name,
                type: file.type,
                blob: file,
                addedAt: new Date().getTime()
            };
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).add(videoData);
            return new Promise((resolve) => tx.oncomplete = () => resolve(videoId));
        };

        const getLocalVideos = async () => {
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            const request = store.getAll();
            return new Promise((resolve) => request.onsuccess = () => resolve(request.result));
        };

        const deleteLocalVideo = async (id) => {
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).delete(id);
            return new Promise((resolve) => tx.oncomplete = () => resolve());
        };

        // App Core
        let config = {
            spreadsheetId: localStorage.getItem('sheets_id') || '',
            apiKey: localStorage.getItem('sheets_api_key') || ''
        };
        
        let player = null;
        const localPlayer = document.getElementById('local-player');
        const ytPlaceholder = document.getElementById('yt-player');
        
        let currentPlaylistData = [];
        let currentIndex = -1;
        let timeTrackerInterval = null;
        let currentPlaylistName = '';
        const COMPLETED_THRESHOLD = 10;

        document.addEventListener('DOMContentLoaded', async () => {
            await initDB();
            if (!config.spreadsheetId || !config.apiKey) openConfig(true);
            else fetchPlaylists();
        });

        async function handleLocalFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const btn = event.target.previousElementSibling;
            btn.classList.add('animate-pulse', 'text-red-500');
            await saveLocalVideo(file);
            btn.classList.remove('animate-pulse', 'text-red-500');
            fetchPlaylists(); 
        }

        function openConfig(isInitial = false) {
            document.getElementById('input-sheet-id').value = config.spreadsheetId;
            document.getElementById('input-api-key').value = config.apiKey;
            document.getElementById('btn-cancel-config').classList.toggle('hidden', isInitial);
            document.getElementById('config-modal').classList.remove('hidden');
        }

        function closeConfig() { document.getElementById('config-modal').classList.add('hidden'); }

        function saveConfig() {
            const newId = document.getElementById('input-sheet-id').value.trim();
            const newKey = document.getElementById('input-api-key').value.trim();
            if (!newId || !newKey) return;
            localStorage.setItem('sheets_id', newId);
            localStorage.setItem('sheets_api_key', newKey);
            config.spreadsheetId = newId;
            config.apiKey = newKey;
            closeConfig();
            fetchPlaylists();
        }

        async function fetchPlaylists() {
            let names = ["Local Files"];
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.spreadsheetId}?fields=sheets.properties.title&key=${config.apiKey}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.sheets) {
                        const sheetNames = data.sheets.map(s => s.properties.title);
                        names = [...names, ...sheetNames];
                    }
                }
            } catch (e) { 
                console.warn("Offline or config error. Only local available.");
            }
            
            populateSelector(names);
            const last = localStorage.getItem('last_playlist');
            if (last && names.includes(last)) {
                document.getElementById('playlist-selector').value = last;
                loadPlaylist(last);
            }
        }

        async function loadPlaylist(sheetName) {
            if (!sheetName) return;
            currentPlaylistName = sheetName;
            localStorage.setItem('last_playlist', sheetName);
            document.getElementById('video-list').innerHTML = '';
            document.getElementById('list-loading').classList.remove('hidden');
            
            if (sheetName === "Local Files") {
                const localVideos = await getLocalVideos();
                document.getElementById('list-loading').classList.add('hidden');
                processLocalVideos(localVideos);
                return;
            }

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.spreadsheetId}/values/${encodeURIComponent(sheetName)}!A:A?key=${config.apiKey}`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('list-loading').classList.add('hidden');

                if (data.values) {
                    processVideos(data.values);
                }
            } catch (e) { 
                document.getElementById('list-loading').classList.add('hidden');
            }
        }

        function populateSelector(names) {
            const selector = document.getElementById('playlist-selector');
            selector.innerHTML = '<option value="" disabled selected>Select Playlist...</option>';
            names.forEach(n => {
                const opt = document.createElement('option');
                opt.value = opt.textContent = n;
                selector.appendChild(opt);
            });
            selector.disabled = false;
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : null;
        }

        function processVideos(rows) {
            let html = '';
            currentPlaylistData = [];
            let validIndex = 0;
            rows.forEach((row) => {
                const videoId = extractVideoID(row[0] || '');
                if (videoId) {
                    currentPlaylistData.push({ id: videoId, type: 'youtube' });
                    const progData = JSON.parse(localStorage.getItem(`yt_prog_${videoId}`) || 'null');
                    const isCompleted = progData && (progData.d - progData.t <= COMPLETED_THRESHOLD);
                    html += generateVideoItemHtml(validIndex, videoId, `Video ${validIndex + 1}`, videoId, progData, isCompleted, true);
                    validIndex++;
                }
            });
            document.getElementById('video-list').innerHTML = html || '<p class="text-center text-gray-500 py-10 text-sm">No valid YouTube links found.</p>';
        }

        function processLocalVideos(videos) {
            let html = '';
            currentPlaylistData = [];
            videos.forEach((v, i) => {
                currentPlaylistData.push({ ...v, type: 'local' });
                const progData = JSON.parse(localStorage.getItem(`yt_prog_${v.id}`) || 'null');
                const isCompleted = progData && (progData.d - progData.t <= COMPLETED_THRESHOLD);
                
                html += `
                <div id="video-item-${i}" onclick="playVideo(${i}, true)" class="video-item flex gap-3 p-3 mb-2 rounded-xl cursor-pointer hover:bg-gray-700/50 border border-transparent ${isCompleted ? 'opacity-40' : ''}">
                    <div class="relative w-24 h-16 shrink-0 bg-gray-700 rounded-lg overflow-hidden flex items-center justify-center border border-gray-600">
                        <svg class="w-6 h-6 text-gray-500" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <div class="absolute bottom-0 left-0 h-1 bg-red-600 video-progress-bar" style="width: ${progData ? (progData.t/progData.d*100) : 0}%"></div>
                    </div>
                    <div class="flex-1 flex flex-col justify-center overflow-hidden min-w-0">
                        <h3 class="text-sm font-semibold text-gray-200 truncate">${v.name}</h3>
                        <div class="flex justify-between items-center mt-1">
                             <p class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">Offline File</p>
                             <button onclick="event.stopPropagation(); removeLocal(${i})" class="text-gray-500 hover:text-red-500 p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                             </button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('video-list').innerHTML = html || '<p class="text-center text-gray-500 py-10 text-sm">No local videos stored.</p>';
        }

        async function removeLocal(idx) {
            const vid = currentPlaylistData[idx];
            if (confirm(`Remove "${vid.name}"?`)) {
                await deleteLocalVideo(vid.id);
                loadPlaylist("Local Files");
            }
        }

        function generateVideoItemHtml(index, id, title, subtitle, progData, isCompleted, isYoutube) {
            const thumb = isYoutube ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : '';
            return `
                <div id="video-item-${index}" onclick="playVideo(${index}, true)" class="video-item flex gap-3 p-3 mb-2 rounded-xl cursor-pointer hover:bg-gray-700/50 border border-transparent ${isCompleted ? 'opacity-40' : ''}">
                    <div class="relative w-24 h-16 shrink-0 bg-black rounded-lg overflow-hidden border border-gray-700">
                        ${isYoutube ? `<img src="${thumb}" class="w-full h-full object-cover opacity-70">` : `<div class="w-full h-full bg-gray-800"></div>`}
                        <div class="absolute bottom-0 left-0 h-1 bg-red-600 video-progress-bar" style="width: ${progData ? (progData.t/progData.d*100) : 0}%"></div>
                    </div>
                    <div class="flex-1 flex flex-col justify-center min-w-0">
                        <h3 class="text-sm font-semibold text-gray-200 truncate">${title}</h3>
                        <p class="text-[10px] text-gray-500 font-mono truncate">${id}</p>
                    </div>
                </div>`;
        }

        function playVideo(index, isManual = false) {
            if (index < 0 || index >= currentPlaylistData.length) return;
            
            currentIndex = index;
            const video = currentPlaylistData[index];
            localStorage.setItem(`progress_${currentPlaylistName}_index`, index);
            
            let startTime = 0;
            const progData = JSON.parse(localStorage.getItem(`yt_prog_${video.id}`) || 'null');
            if (progData && (progData.d - progData.t > COMPLETED_THRESHOLD)) {
                startTime = progData.t;
            }

            if (isManual) document.getElementById('dummy-audio').play().catch(() => {});

            updateActiveVideoStyle(index);
            document.getElementById('player-placeholder').classList.add('hidden');
            document.getElementById('player-wrapper').classList.remove('hidden');

            if (video.type === 'youtube') {
                localPlayer.classList.add('hidden');
                localPlayer.pause();
                ytPlaceholder.classList.remove('hidden');
                
                if (!player) {
                    player = new YT.Player('yt-player', {
                        height: '100%', width: '100%', videoId: video.id,
                        host: 'https://www.youtube-nocookie.com',
                        playerVars: {
                            'autoplay': isManual ? 1 : 0,
                            'start': Math.floor(startTime),
                            'playsinline': 1,
                            'enablejsapi': 1,
                            'modestbranding': 1,
                            'rel': 0
                        },
                        events: {
                            'onStateChange': onPlayerStateChange,
                            'onError': () => setTimeout(playPreviousVideo, 2000)
                        }
                    });
                } else {
                    if (isManual) player.loadVideoById({ videoId: video.id, startSeconds: startTime });
                    else player.cueVideoById({ videoId: video.id, startSeconds: startTime });
                }
            } else {
                ytPlaceholder.classList.add('hidden');
                if (player) player.pauseVideo();
                localPlayer.classList.remove('hidden');
                
                const url = URL.createObjectURL(video.blob);
                localPlayer.src = url;
                localPlayer.currentTime = startTime;
                
                if (isManual) localPlayer.play();

                localPlayer.onplay = () => {
                    updatePlayPauseUI(true);
                    startLocalTracking();
                };
                localPlayer.onpause = () => {
                    updatePlayPauseUI(false);
                    clearInterval(timeTrackerInterval);
                };
                localPlayer.onended = () => playPreviousVideo();
            }
        }

        function startLocalTracking() {
            clearInterval(timeTrackerInterval);
            timeTrackerInterval = setInterval(() => {
                const t = localPlayer.currentTime;
                const d = localPlayer.duration;
                if (d > 0) {
                    localStorage.setItem(`yt_prog_${currentPlaylistData[currentIndex].id}`, JSON.stringify({t, d}));
                    updateVideoUI(currentIndex, t, d);
                }
            }, 2000);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                updatePlayPauseUI(true);
                document.getElementById('dummy-audio').play().catch(() => {});
                clearInterval(timeTrackerInterval);
                timeTrackerInterval = setInterval(() => {
                    const t = player.getCurrentTime();
                    const d = player.getDuration();
                    if (d > 0) {
                        localStorage.setItem(`yt_prog_${currentPlaylistData[currentIndex].id}`, JSON.stringify({t, d}));
                        updateVideoUI(currentIndex, t, d);
                    }
                }, 2000);
            } else if (event.data === YT.PlayerState.PAUSED) {
                updatePlayPauseUI(false);
                document.getElementById('dummy-audio').pause();
                clearInterval(timeTrackerInterval);
            } else if (event.data === YT.PlayerState.ENDED) {
                playPreviousVideo();
            }
        }

        function playPreviousVideo() {
            const nextIdx = findNextAutoIndex(currentIndex);
            if (nextIdx !== -1) playVideo(nextIdx, true);
        }

        function findNextAutoIndex(fromIndex) {
            for (let i = fromIndex - 1; i >= 0; i--) {
                const vid = currentPlaylistData[i];
                const progData = JSON.parse(localStorage.getItem(`yt_prog_${vid.id}`) || 'null');
                if (!(progData && (progData.d - progData.t <= COMPLETED_THRESHOLD))) return i;
            }
            return -1;
        }

        function togglePlayPause() {
            const video = currentPlaylistData[currentIndex];
            if (!video) return;
            if (video.type === 'youtube') {
                if (!player) return;
                player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
            } else {
                localPlayer.paused ? localPlayer.play() : localPlayer.pause();
            }
        }

        function seekVideo(s) {
            const video = currentPlaylistData[currentIndex];
            if (!video) return;
            if (video.type === 'youtube') {
                if (!player) return;
                player.seekTo(player.getCurrentTime() + s, true);
            } else {
                localPlayer.currentTime += s;
            }
        }

        function updatePlayPauseUI(isPlaying) {
            document.getElementById('icon-play').classList.toggle('hidden', isPlaying);
            document.getElementById('icon-pause').classList.toggle('hidden', !isPlaying);
        }

        function updateVideoUI(index, time, duration) {
            const el = document.getElementById(`video-item-${index}`);
            if (!el) return;
            const bar = el.querySelector('.video-progress-bar');
            if (bar) bar.style.width = `${(time / duration) * 100}%`;
            if (duration - time <= COMPLETED_THRESHOLD) el.classList.add('opacity-40');
        }

        function updateActiveVideoStyle(idx) {
            document.querySelectorAll('.video-item').forEach((el, i) => {
                el.classList.toggle('bg-gray-700/80', i === idx);
                el.classList.toggle('border-red-500/50', i === idx);
                if (i === idx) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        }

        function onYouTubeIframeAPIReady() {}
    </script>
</body>
</html>
